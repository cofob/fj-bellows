syntax = "proto3";

package fjbellows.control.v1;

option go_package = "github.com/hstern/fj-bellows/gen/fjbellows/control/v1;controlv1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/duration.proto";

// ControlService is the operator-facing control plane for a running fj-bellows
// daemon. Mounted via ConnectRPC so the same handler speaks Connect/JSON
// (curl-friendly), gRPC, and gRPC-Web (for a future browser client).
service ControlService {
  // Health returns a readiness snapshot: is the reconcile loop ticking,
  // and have the upstream probes (provider, Forgejo) succeeded recently?
  rpc Health(HealthRequest) returns (HealthResponse);

  // ListWorkers returns the orchestrator's current view of every worker VM
  // in the pool: state, address, when it was created / last busy, and the
  // current job handle if any. This is what the e2e harness will poll
  // instead of grepping the orchestrator's stderr log for "worker ready" /
  // "job complete" / "destroyed idle node".
  rpc ListWorkers(ListWorkersRequest) returns (ListWorkersResponse);

  // GetCache returns the managed pull-through registry cache VM's state.
  // Present=false for providers that don't manage a cache (docker), or
  // when the `cache:` block is absent. Turns the e2e harness's soft
  // "/v2/ reachable" check into a fatal "cache present + running" gate.
  rpc GetCache(GetCacheRequest) returns (GetCacheResponse);

  // Reconcile drives a synchronous out-of-band reconcile pass and returns
  // the per-tick summary (Provisioned, Dispatched, Reaped, Adopted,
  // Dropped, Errors). The e2e harness uses this to force a second cycle
  // without waiting on the poll interval (FJB-17 multi-cycle).
  rpc Reconcile(ReconcileRequest) returns (ReconcileResponse);

  // ForceReap immediately destroys the worker with the given instance ID,
  // even if billing policy would keep it warm. Cancels any in-flight teardown
  // state and runs provider.Destroy from the reconcile goroutine (so the
  // single-writer property is preserved). Drops the node from the pool on
  // success. Every call is audit-logged with the caller identity. Returns
  // a Connect error (CodeNotFound) when the instance isn't in the pool,
  // (CodeInternal) when Destroy fails, or (CodePermissionDenied) when
  // -enable-control-writes is unset.
  rpc ForceReap(ForceReapRequest) returns (ForceReapResponse);

  // ForceProvision spawns one extra worker, bypassing the scale.max cap
  // for this single tick. Audit-logged. Returns the new worker's
  // instance_id on success, or a Connect error (CodeInternal) when
  // Provision fails immediately. Async readiness errors surface later as
  // worker_reaped events on the StreamEvents stream. Returns
  // CodePermissionDenied when -enable-control-writes is unset.
  rpc ForceProvision(ForceProvisionRequest) returns (ForceProvisionResponse);

  // StreamEvents emits state-transition events as they happen:
  // worker_provisioned, worker_ready, worker_busy, worker_idle,
  // worker_reaped, worker_adopted, worker_dropped, job_dispatched,
  // job_complete, zombie_reaped, reconcile_tick, route_decided, and
  // route_deferred. The stream stays open
  // until the client disconnects or the daemon shuts down. Slow clients
  // are dropped (channel closed) rather than blocking the producer.
  //
  // The first message on every stream is type="stream_opened" with empty
  // attrs — a sentinel that makes the open call return immediately even
  // on a quiet daemon (Connect server-streaming only writes response
  // headers on the first Send). Clients should skip it.
  rpc StreamEvents(StreamEventsRequest) returns (stream StreamEventsResponse);

  // Pause stops the reconcile loop's auto-tick. In-flight work continues;
  // explicit Reconcile / ForceReap / ForceProvision RPCs still fire.
  // Idempotent. Audit-logged when FJB-26 caller plumbing is present.
  // Gated by -enable-control-writes; returns CodePermissionDenied otherwise.
  rpc Pause(PauseRequest) returns (PauseResponse);

  // Resume re-arms the auto-tick. Idempotent. Audit-logged. Gated by
  // -enable-control-writes; returns CodePermissionDenied otherwise.
  rpc Resume(ResumeRequest) returns (ResumeResponse);

  // GetConfig returns the daemon's resolved live config as YAML, with secrets
  // (forgejo.token, anything inside provider_config that looks like a token/
  // password/secret/key) redacted. Useful for confirming the running process
  // parsed config.yaml as the operator intended.
  rpc GetConfig(GetConfigRequest) returns (GetConfigResponse);

  // ReloadConfig re-reads config.yaml from disk and hot-swaps the
  // hot-reloadable subset (poll interval, capacity/timers, and drain
  // settings). Returns CodeFailedPrecondition with a clear error if the
  // new config changes provider routing/config, labels, Forgejo, database,
  // or tag — those require a daemon restart.
  rpc ReloadConfig(ReloadConfigRequest) returns (ReloadConfigResponse);

  // ExecOnWorker runs a single shell command on the worker identified by
  // instance_id, returning stdout/stderr/exit code. Uses the orchestrator's
  // existing SSH dispatcher; no new credentials. Audit-logged. Bounded
  // command size, bounded output size — see the field comments. Gated by
  // the daemon's -enable-control-writes flag.
  rpc ExecOnWorker(ExecOnWorkerRequest) returns (ExecOnWorkerResponse);

  // StreamLogs streams structured slog records from the daemon. The first
  // message is a stream_opened sentinel (zero `at`, empty `message`,
  // level=""); clients should skip it (same convention as StreamEvents).
  //
  // Optional filters scope the stream to one worker (instance_id, matched
  // against attrs["id"]) or one job (handle, matched against
  // attrs["handle"]). Empty fields mean no filter on that dimension; an
  // empty request streams every record.
  //
  // On connect, the daemon replays up to history_lines previous records
  // (capped at the daemon's ring-buffer capacity), then streams live
  // records as they happen. history_lines=0 means "no replay, only new".
  //
  // The level field is the slog level's String() form
  // ("DEBUG"/"INFO"/"WARN"/"ERROR").
  rpc StreamLogs(StreamLogsRequest) returns (stream StreamLogsResponse);

  // ProviderInfo returns provider-defined operator-debug info as a free-form
  // key/value map. Keys are stable, documented per provider in
  // `internal/provider/<name>/README.md`. Useful for capacity-full incidents
  // (FJB-11), account-state checks, and confirming managed-resource IDs.
  rpc ProviderInfo(ProviderInfoRequest) returns (ProviderInfoResponse);

  // JobHistory reads durable, newest-first CI job history from SQLite.
  rpc JobHistory(JobHistoryRequest) returns (JobHistoryResponse);

  // Statistics aggregates durable job timing, outcomes, and fixed-point cost
  // estimates without combining different currencies.
  rpc Statistics(StatisticsRequest) returns (StatisticsResponse);
}

message HealthRequest {}

message HealthResponse {
  // healthy is true when every signal below is within the freshness threshold
  // (3 * poll_interval). A daemon that just started reports healthy once it has
  // completed its first reconcile tick.
  bool healthy = 1;

  // last_tick_at is when the reconcile loop most recently completed.
  google.protobuf.Timestamp last_tick_at = 2;

  // last_provider_list_at is when prov.List most recently succeeded.
  google.protobuf.Timestamp last_provider_list_at = 3;

  // last_forgejo_poll_at is when WaitingJobs or ListRunners most recently
  // succeeded; whichever was later.
  google.protobuf.Timestamp last_forgejo_poll_at = 4;

  // paused is true when the reconcile loop's auto-tick is suppressed by a
  // prior Pause RPC. Explicit Reconcile / ForceReap / ForceProvision still
  // fire while paused; in-flight dispatch/teardown goroutines also keep
  // running. A long-paused daemon will report healthy=false because the
  // freshness counters (last_tick_at, ...) only advance on a real reconcile;
  // the `paused` flag is the operator's signal that this is intentional.
  bool paused = 5;

  bool database_healthy = 6;
  google.protobuf.Timestamp database_last_successful_write_at = 7;
  string database_last_error = 8;
  bool routing_healthy = 9;
  google.protobuf.Timestamp routing_last_poll_at = 10;
  google.protobuf.Timestamp routing_last_decision_at = 11;
  string routing_last_error = 12;
  bool routing_degraded_pricing = 13;
}

message ListWorkersRequest {
  string tier = 1;
  string provider = 2;
}

message ListWorkersResponse {
  repeated Worker workers = 1;
}

// Worker is the orchestrator's view of a single worker VM. Field shape
// mirrors orchestrator.Node plus the active job handle (recorded by the
// dispatch goroutine when a node transitions to Busy).
message Worker {
  // instance_id is the provider's identifier (Linode ID, docker container
  // ID, etc.). Unique within a deployment's tag scope.
  string instance_id = 1;

  // state is one of: provisioning | idle | busy | resetting | draining | removing.
  string state = 2;

  // ip is the worker's public IPv4 address. Empty for providers that
  // dispatch by container exec (docker), and empty under future
  // private-only worker configurations (see FJB-57).
  string ip = 3;

  // vpc_ip is the worker's IPv4 address on the provider VPC, when one is
  // configured. Empty when no VPC is in use. Under the cache-as-gateway
  // transport (FJB-54, transport.mode=cache-gateway) this is the address
  // the orchestrator dials for dispatch; under the legacy SSH-on-public-IP
  // transport `ip` is the dial address and this field is informational.
  // Stable across the worker's lifetime once assigned.
  string vpc_ip = 10;

  // created_at is the provider's instance creation time. Anchors the
  // billing-hour timer.
  google.protobuf.Timestamp created_at = 4;

  // last_busy is when the node most recently finished (or started) a job;
  // drives the per-second idle timeout.
  google.protobuf.Timestamp last_busy = 5;

  // current_job is the Forgejo job handle in flight on this worker. Empty
  // unless state == "busy". Goes empty again when the dispatch goroutine
  // transitions the node back to idle.
  string current_job = 6;

  // paid_hour_end_at is when the next paid-hour boundary closes for
  // this worker (hourly-billed providers). Empty for per-second.
  google.protobuf.Timestamp paid_hour_end_at = 7;

  // reap_eligible_at is the earliest time the policy will tear this
  // worker down. last_busy + idle_timeout for per-second; the next
  // :55 mark for hourly.
  google.protobuf.Timestamp reap_eligible_at = 8;

  // billing_model is the provider's billing model string:
  // "per_second" or "hourly_round_up".
  string billing_model = 9;

  string tier = 11;
  string provider = 12;
  string driver = 13;
}

message GetCacheRequest { string provider = 1; }

message GetCacheResponse {
  // present is true when a managed cache is configured AND its Linode ID is
  // populated (ensureAtConfigure has run). False both for "no cache:
  // block" and for "cache is being set up but not yet ready".
  bool present = 1;

  // adopted_existing is true when the cache VM was found pre-existing
  // and adopted rather than created fresh. Daemon restart against a
  // warm cache sets this to true.
  bool adopted_existing = 2;

  // linode_id is the provider's instance ID for the cache VM. Zero when
  // present is false.
  int64 linode_id = 3;

  // vpc_ip is the cache VM's IPv4 on the VPC subnet. Empty until the
  // first WorkerExtras call resolves it.
  string vpc_ip = 4;

  // bucket_region is the Linode Object Storage region holding the
  // cache's S3-compatible bucket.
  string bucket_region = 5;

  // bucket_label is the bucket name.
  string bucket_label = 6;

  // vm_state is the Linode API's instance status field
  // (running, booting, offline, ...). Empty when not present, or when
  // the on-demand Linode API call failed (caller can retry).
  string vm_state = 7;
}

message ReconcileRequest {}

message ReconcileResponse {
  // Counts of intents started during the tick. Async work
  // (provision/destroy goroutines) may still be in flight when this
  // response returns.
  int32 provisioned = 1;
  int32 dispatched = 2;
  int32 reaped = 3;
  int32 adopted = 4;
  int32 dropped = 5;
  // One entry per failing top-level step in the tick (list instances,
  // poll waiting jobs, ...). Empty on a fully-clean tick.
  repeated string errors = 6;
}

message ForceReapRequest {
  // instance_id is the provider's identifier (Linode ID, docker container
  // ID, etc.) of the worker to destroy. Must be present in the pool.
  string instance_id = 1;
  string tier = 2;
}

// ForceReapResponse is intentionally empty — failure surfaces via the
// Connect error code, success means "Destroy returned cleanly and the
// node was dropped from the pool."
message ForceReapResponse {}

message ForceProvisionRequest { string tier = 1; }

message ForceProvisionResponse {
  // instance_id is the provider's identifier for the newly created
  // worker. Set on success; the worker may still be in StateProvisioning
  // when this returns (WaitReady runs asynchronously).
  string instance_id = 1;
}

// PauseRequest is empty: pause is a global toggle, no parameters in v1.
message PauseRequest {}

// PauseResponse is intentionally empty — success means "auto-tick is now
// suppressed." Idempotent: pausing an already-paused daemon returns OK.
message PauseResponse {}

// ResumeRequest is empty: resume is a global toggle, no parameters in v1.
message ResumeRequest {}

// ResumeResponse is intentionally empty — success means "auto-tick is now
// armed." Idempotent: resuming an unpaused daemon returns OK.
message ResumeResponse {}

message ExecOnWorkerRequest {
  // instance_id identifies the worker to exec into. Must be present in
  // the pool and in state idle or busy. Workers in provisioning (SSH may
  // not be up yet) or removing (Destroy is in flight) are rejected.
  string instance_id = 1;

  // command is the shell command line to run. Run with `sh -c <command>`
  // on the worker. Capped at 64 KiB; longer requests are rejected with
  // CodeInvalidArgument.
  string command = 2;
  string tier = 3;
}

message ExecOnWorkerResponse {
  // stdout/stderr are truncated to 1 MiB each. truncated_stdout /
  // truncated_stderr report the original byte counts when truncation
  // happened so the operator knows there was more.
  bytes stdout = 1;
  bytes stderr = 2;
  int32 exit_code = 3;
  int64 truncated_stdout = 4;
  int64 truncated_stderr = 5;
}

message StreamEventsRequest {
  string tier = 1;
  string provider = 2;
}

message StreamEventsResponse {
  // at is when the event fired in the orchestrator's clock.
  google.protobuf.Timestamp at = 1;
  // type is a stable slug — see the StreamEvents RPC comment for the set.
  string type = 2;
  // attrs holds the per-event detail (instance id, ip, handle, counts).
  // The set of keys depends on type; documented inline in the orchestrator
  // emit sites.
  map<string, string> attrs = 3;
}

message GetConfigRequest {}

message GetConfigResponse {
  // yaml is the daemon's resolved live config rendered as YAML, with
  // secret-bearing fields replaced by "<redacted>". An operator can
  // diff this against the on-disk config.yaml to confirm the daemon
  // parsed it as intended.
  string yaml = 1;

  // config_path is the filesystem path the daemon originally loaded
  // (the -config flag's value). Useful when the operator isn't sure
  // which config the running process is using.
  string config_path = 2;
}

message ReloadConfigRequest {}

message ReloadConfigResponse {
  // changed_fields names every hot-reloadable field whose value differs
  // from the previously-running config, in dotted-key form
  // (e.g. "scale.max", "poll.interval", "forgejo.labels"). Empty means
  // the re-read parsed to the same values that were already live.
  repeated string changed_fields = 1;
}

message StreamLogsRequest {
  // instance_id scopes the stream to records whose attrs["id"] matches.
  // Empty = no filter on this dimension.
  string instance_id = 1;

  // handle scopes the stream to records whose attrs["handle"] matches.
  // Empty = no filter on this dimension.
  string handle = 2;

  // history_lines is the number of previously buffered records to replay
  // before live streaming begins. 0 = no replay. The daemon caps this at
  // its ring-buffer capacity.
  int32 history_lines = 3;
}

message ProviderInfoRequest { string provider = 1; }

message ProviderInfoResponse {
  // provider is the provider name slug ("linode", "docker", ...).
  string provider = 1;
  // info is the provider's key/value map. Empty for providers that
  // don't implement InfoProvider.
  map<string, string> info = 2;
}

message StreamLogsResponse {
  // at is when the record was emitted, in the daemon's clock.
  google.protobuf.Timestamp at = 1;

  // level is the slog level's String() form: "DEBUG", "INFO", "WARN", or
  // "ERROR". Empty on the stream_opened sentinel.
  string level = 2;

  // message is the slog record's message.
  string message = 3;

  // attrs holds the slog record's flattened attributes. Group attributes
  // are flattened with dot-separated keys (`group.key`); non-string scalar
  // values use slog.Value.String().
  map<string, string> attrs = 4;
}

message JobHistoryRequest {
  google.protobuf.Timestamp from = 1;
  google.protobuf.Timestamp to = 2;
  string tier = 3;
  string provider = 4;
  string repository = 5;
  string workflow = 6;
  string status = 7;
  int32 limit = 8;
  string cursor = 9;
}

message JobHistoryResponse {
  repeated Job jobs = 1;
  string next_cursor = 2;
}

message Job {
  int64 id = 1;
  string source = 2;
  string handle = 3;
  int64 forgejo_job_id = 4;
  int64 attempt = 5;
  int64 repository_id = 6;
  string repository = 7;
  string workflow = 8;
  string workflow_file = 9;
  string job_name = 10;
  string identity_quality = 11;
  string tier = 12;
  string provider = 13;
  string driver = 14;
  string status = 15;
  string conclusion = 16;
  string infrastructure_failure = 17;
  google.protobuf.Timestamp first_seen_at = 18;
  google.protobuf.Timestamp queued_at = 19;
  google.protobuf.Timestamp dispatched_at = 20;
  google.protobuf.Timestamp runner_started_at = 21;
  google.protobuf.Timestamp runner_finished_at = 22;
  google.protobuf.Timestamp completed_at = 23;
}

message StatisticsRequest {
  google.protobuf.Timestamp from = 1;
  google.protobuf.Timestamp to = 2;
  string tier = 3;
  string provider = 4;
  string repository = 5;
  string workflow = 6;
  // group_by is one of: none, workflow, tier, provider, day.
  string group_by = 7;
  string route = 8;
}

message StatisticsResponse {
  repeated StatisticsGroup groups = 1;
  repeated FleetCostTotal fleet_costs = 2;
  repeated FleetTimingTotal fleet_timings = 3;
  repeated RoutingEffectiveness routing_effectiveness = 4;
}

message StatisticsKey {
  string source = 1;
  int64 repository_id = 2;
  string repository = 3;
  string workflow = 4;
  string tier = 5;
  string provider = 6;
  string day = 7;
}

message DurationSummary {
  int64 count = 1;
  google.protobuf.Duration total = 2;
  google.protobuf.Duration min = 3;
  google.protobuf.Duration max = 4;
  google.protobuf.Duration p50 = 5;
  google.protobuf.Duration p95 = 6;
}

message CostTotal {
  string kind = 1;
  string currency = 2;
  int64 nanos = 3;
  int64 entries = 4;
  int64 unknown_entries = 5;
  bool estimated = 6;
}

message StatisticsGroup {
  StatisticsKey key = 1;
  int64 jobs = 2;
  int64 completed = 3;
  int64 succeeded = 4;
  int64 failed = 5;
  int64 cancelled = 6;
  int64 skipped = 7;
  int64 infra_failed = 8;
  int64 interrupted = 9;
  int64 in_progress = 10;
  int64 priced_jobs = 11;
  int64 unpriced_jobs = 12;
  DurationSummary queue_duration = 13;
  DurationSummary dispatch_duration = 14;
  DurationSummary run_duration = 15;
  repeated CostTotal direct_costs = 16;
}

message FleetCostTotal {
  string tier = 1;
  string provider = 2;
  string day = 3;
  string kind = 4;
  string currency = 5;
  int64 nanos = 6;
  int64 entries = 7;
  int64 unknown_entries = 8;
  bool estimated = 9;
}

message FleetTimingTotal {
  string tier = 1;
  string provider = 2;
  string day = 3;
  string kind = 4;
  DurationSummary duration = 5;
}

message RoutingSelection {
  string tier = 1;
  string provider = 2;
  int64 jobs = 3;
}

message RoutingEffectiveness {
  string route = 1;
  string required_label = 2;
  string currency = 3;
  int64 decisions = 4;
  int64 completed = 5;
  int64 fallback_decisions = 6;
  int64 history_decisions = 7;
  int64 idle_decisions = 8;
  int64 deferred_decisions = 9;
  int64 p95_hits = 10;
  int64 p95_misses = 11;
  int64 estimated_selected_nanos = 12;
  int64 estimated_fallback_nanos = 13;
  int64 estimated_savings_nanos = 14;
  int64 actual_direct_nanos = 15;
  int64 actual_unknown_entries = 16;
  repeated RoutingSelection selections = 17;
}
